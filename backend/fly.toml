# fly.toml app configuration file for keen-backend
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.

app = 'keen-backend'
primary_region = 'iad'

[build]
  dockerfile = '../Dockerfile.backend'

[env]
  DEBUG = 'false'
  ENVIRONMENT = 'production'
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 200
    soft_limit = 150

  [[http_service.checks]]
    interval = '30s'
    timeout = '10s'
    grace_period = '15s'
    method = 'GET'
    path = '/api/v1/health'

[[vm]]
  memory = '512mb'
  cpus = 1
